<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIA Secure Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&family=Sniglet:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bunny-pink: #ffcceb;
            --easter-blue: #ccebff;
            --grass-green: #99ff99;
            --spy-green: #00ff00;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--easter-blue);
            font-family: 'Sniglet', cursive;
        }

        /* The Easter Background Styling */
        #ui-layer {
            position: absolute; width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, var(--easter-blue) 0%, #ffffff 100%);
            z-index: 10;
        }

        .grass {
            position: absolute; bottom: 0; width: 100%; height: 100px;
            background: var(--grass-green); border-top: 5px dashed #77dd77;
        }

        #start-button {
            padding: 25px 50px; font-size: 24px; background-color: var(--bunny-pink);
            color: #d81b60; border: 5px solid white; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 0 #f48fb1; text-transform: uppercase;
            z-index: 20; transition: all 0.1s;
        }
        #start-button:active { transform: translateY(5px); box-shadow: 0 5px 0 #f48fb1; }

        /* V1 YouTube Container */
        #player-container {
            display: none; position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh; background: #000; z-index: 9999;
        }
        #player { width: 100%; height: 100%; }
        
        #curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; align-items: center; justify-content: center;
            color: var(--spy-green); font-family: 'Courier New', Courier, monospace;
            z-index: 10001; pointer-events: none; text-align: center;
        }
        
        .spinner {
            border: 4px solid rgba(0, 255, 0, 0.1); border-left-color: var(--spy-green);
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #shield {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; z-index: 10000; display: none; pointer-events: none;
        }

        /* V2 Tactical Text Container */
        #tactical-container {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 9999; color: var(--spy-green);
            font-family: 'Courier New', Courier, monospace; box-sizing: border-box; padding: 20px;
        }

        .handler-ui, .terminal-ui {
            display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center;
        }

        #riddle-input {
            width: 90%; max-width: 500px; height: 150px; background: #111;
            color: var(--spy-green); border: 2px solid var(--spy-green);
            padding: 15px; font-family: inherit; font-size: 18px; margin: 20px 0;
        }

        .tactical-btn {
            padding: 15px 30px; background: var(--spy-green); color: #000;
            font-weight: bold; border: none; font-size: 18px; cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <h1 style="color: #5c6bc0; text-align: center; padding: 20px;">INCOMING BUNNY<br>TRANSMISSION...</h1>
        <button id="start-button">🔊 DECRYPT MESSAGE</button>
        <div class="grass"></div>
    </div>

    <div id="player-container">
        <div id="player"></div>
        <div id="curtain">
            <div>
                <div class="spinner"></div>
                <h2>ESTABLISHING CONNECTION...</h2>
                <p>Decrypting Agent Clover's Video</p>
            </div>
        </div>
        <div id="shield"></div>
    </div>

    <div id="tactical-container">
        <div id="handler-ui" class="handler-ui">
            <h2>[HANDLER OVERRIDE REQUIRED]</h2>
            <p>Database shows no active intel for this Sector.<br>Enter local mission coordinates / riddle below:</p>
            <textarea id="riddle-input" placeholder="Example: Check the place where the cold air blows and the ice is kept..."></textarea>
            <button class="tactical-btn" id="lock-riddle-btn">LOCK ENCRYPTION</button>
        </div>

        <div id="terminal-ui" class="terminal-ui">
            <h2>[DECRYPTED INTEL RECEIVED]</h2>
            <div id="typewriter-text" style="font-size: 24px; white-space: pre-wrap; margin-top: 20px; text-align: left; max-width: 600px;"></div>
        </div>
    </div>

   <script>
    // 1. CONFIG & GLOBALS
    const urlParams = new URLSearchParams(window.location.search);
    const clueId = urlParams.get('clue') || '1';
    const deckId = urlParams.get('deck') || 'DEFAULT_DECK'; 
    const databaseCardId = `${deckId}-STATION-${clueId}`;
    const videoClues = ['0', '10']; 
    const isVideoMission = videoClues.includes(clueId);

    let sbClient = null;

    // 2. SUPABASE INITIALIZATION
        async function getSupabaseClient() {
            if (sbClient) return sbClient;
    
            const supabaseUrl = 'REPLACE_WITH_URL'.trim();
            const supabaseKey = 'REPLACE_WITH_KEY'.trim();
    
            // LOGIC: If the URL contains 'supabase.co', we know the swap worked.
            if (supabaseUrl.includes('supabase.co')) {
                try {
                    if (window.supabase) {
                        sbClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                        console.log("✅ LIVE: Connected to Agent Clover Database.");
                        return sbClient;
                    }
                } catch (e) {
                    console.error("❌ Connection failed:", e);
                }
            } else {
                console.warn("⚠️ OFFLINE: Placeholder detected. Using LocalStorage.");
            }
            
            return null;
    }

    // 3. MAIN BUTTON LOGIC
    document.getElementById('start-button').addEventListener('click', async function() {
        console.log("Decrypt button clicked...");
        document.getElementById('ui-layer').style.display = 'none';

        if (isVideoMission) {
            initYouTubePlayer();
        } else {
            document.getElementById('tactical-container').style.display = 'block';
            await fetchRiddleData();
        }
    });

    // 4. DATABASE FETCH
    async function fetchRiddleData() {
        const client = await getSupabaseClient();
        
        if (!client) {
            const localData = localStorage.getItem(databaseCardId);
            if (localData) showTypewriter(localData);
            else document.getElementById('handler-ui').style.display = 'flex';
            return;
        }

        const { data, error } = await client
            .from('mission_data')
            .select('*')
            .eq('card_id', databaseCardId)
            .single();

        if (data && data.is_locked) {
            showTypewriter(data.riddle_text);
        } else {
            document.getElementById('handler-ui').style.display = 'flex';
        }
    }

    // 5. LOCK RIDDLE
    document.getElementById('lock-riddle-btn').addEventListener('click', async () => {
        const text = document.getElementById('riddle-input').value;
        if (!text) return alert("Please enter intel.");

        const client = await getSupabaseClient();

        if (!client) {
            localStorage.setItem(databaseCardId, text);
        } else {
            const { error } = await client.from('mission_data').upsert({ 
                card_id: databaseCardId, 
                riddle_text: text, 
                is_locked: true 
            });
            if (error) return alert("Encryption failed.");
        }

        document.getElementById('handler-ui').style.display = 'none';
        showTypewriter(text);
    });

    // 6. UI EFFECTS
    function showTypewriter(text) {
        document.getElementById('terminal-ui').style.display = 'flex';
        const element = document.getElementById('typewriter-text');
        element.innerHTML = '';
        let i = 0;
        function type() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 50);
            }
        }
        type();
    }

    // 7. YOUTUBE LOGIC
    const videoMap = { '0': 'HizAxchnSaM', '10': 'EZwp9gb4Zl4', '42069': 'dQw4w9WgXcQ' };
    let player;

    function initYouTubePlayer() {
        const container = document.getElementById('player-container');
        container.style.display = 'block';
        if (container.requestFullscreen) container.requestFullscreen();

        if (window.YT && window.YT.Player) {
            launchVideo();
        } else {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
            window.onYouTubeIframeAPIReady = launchVideo;
        }
    }

    function launchVideo() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            videoId: videoMap[clueId] || videoMap['0'],
            playerVars: { 'autoplay': 1, 'controls': 1 },
            events: { 'onStateChange': (e) => {
                if (e.data == YT.PlayerState.PLAYING) {
                    document.getElementById('curtain').style.display = 'none';
                }
            }}
        });
    }
</script>
</body>
</html>
