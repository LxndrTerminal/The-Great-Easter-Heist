<!-- TOP SECRET: My favorite snack is Toasted Almond Carrot Cake -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easter Bunny Transmission</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&family=Sniglet:wght@800&display=swap" rel="stylesheet">
    <style>
      
        :root {
            --bunny-pink: #ffcceb;
            --easter-blue: #ccebff;
            --grass-green: #99ff99;
            --egg-purple: #e2ccff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--easter-blue);
            font-family: 'Sniglet', cursive;
        }

        /* The Easter Background Styling */
        #ui-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, var(--easter-blue) 0%, #ffffff 100%);
            z-index: 10;
        }

        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--grass-green);
            border-top: 5px dashed #77dd77;
        }

        /* The "Unlock" Button */
        #start-button {
            padding: 25px 50px;
            font-size: 24px;
            background-color: var(--bunny-pink);
            color: #d81b60;
            border: 5px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #f48fb1;
            transition: all 0.1s;
            z-index: 20;
            text-transform: uppercase;
        }

        #start-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #f48fb1;
        }

        #player-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
        }
        
        #curtain {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a; /* Dark 'Agent' background */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001; /* Sits above the player */
            color: #00ff00; /* Spy green */
            font-family: 'Courier New', Courier, monospace;
            z-index: 10001; /* Must be higher than shield */
            pointer-events: none; /* Allows you to tap the YouTube button underneath */
        }
        
        .loader-content { text-align: center; }
        
        .spinner {
            border: 4px solid rgba(0, 255, 0, 0.1);
            border-left-color: #00ff00;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #shield {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            z-index: 10000; /* Sits between player and curtain */
            display: none; /* Keep hidden initially */
            pointer-events: none; /* THIS IS KEY: Allows clicks to pass through */
            }        
        }

        #player { width: 100%; height: 100%; }

    </style>
</head>
<body>
<!--
 (\ /)
( . .)  <- Clover is watching your margins. 
c(")(")    Center your divs, or he'll hide your socks!
-->  
    <div id="ui-layer">
        <h1 style="color: #5c6bc0; text-align: center; padding: 20px;">INCOMING BUNNY<br>TRANSMISSION...</h1>
        <button id="start-button">🔊 DECRYPT & PLAY MESSAGE</button>
        <div class="grass"></div>
    </div>

<div id="player-container">
    <div id="player"></div>
    
    <div id="curtain">
        <div class="loader-content">
            <div class="spinner"></div>
            <h2>ESTABLISHING CONNECTION...</h2>
            <p>Decrypting Agent Clover's Message</p>
        </div>
    </div>

    <div id="shield"></div>
</div>

    <script>
      
        // 1. Get Clue ID from URL (e.g., hunt.github.io/?clue=1)
        const urlParams = new URLSearchParams(window.location.search);
        const clueId = urlParams.get('clue') || '1';
        // The Secret Agent Console Log
        console.log("%c STOP! %c Secret Agent Eyes Only! ", "color: #d81b60; font-size: 20px; font-weight: bold;", "color: #5c6bc0; font-size: 15px;");
        console.log("Clover is watching... keep hunting, Agent " + clueId + "!");
        // 2. Mapping your YouTube IDs here
        const videoMap = {
            '1': 'ZuZZnovXLBs',
            '2': 'yq7zA4jeGKM',
            '3': 'EjjHTYZhJM4',
            '4': 'fM1BtVtJogM',
            '5': 'c8J5KZwPMTo',
            '6': 'nRGl_-gNoPI',
            '7': 'iSDM_Iz--Wg',
            '8': 'XHltn6n2WFw',
            '9': 'ZgpuAlAyY-c',
            '10': 'EZwp9gb4Zl4',
            '42069': 'dQw4w9WgXcQ',
            '99': 'dQw4w9WgXcQ',
            '0': 'jGdl_oFhTWw',
            // ... add all 11 IDs here
        };

        const videoId = videoMap[clueId];

        // 3. Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3,
                    'fs': 1 // Allow full screen button
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }


        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // 1. Hide the loading screen
                curtain.style.display = 'none';
                
                // 2. Make the shield visible AND active
                shield.style.display = 'block';
                shield.style.pointerEvents = 'auto'; // Now it blocks interaction!
            }
            if (event.data == YT.PlayerState.ENDED) {
            // 1. Drop the shield so they can interact again
            shield.style.pointerEvents = 'none';
            shield.style.display = 'none';
            
            // 2. Bring back the curtain with a "Replay" message
            curtain.style.display = 'flex';
            curtain.innerHTML = `
                <div class="loader-content">
                    <h2>TRANSMISSION ENDED</h2>
                    <button onclick="location.reload()" style="padding:10px 20px; background:#00ff00; color:#000; border:none; font-weight:bold; cursor:pointer;">REPLAY MISSION</button>
                    <p style="margin-top:20px;">Move to the next location!</p>
                </div>
            `;
            }
        }
    
        document.getElementById('start-button').addEventListener('click', function() {
            const container = document.getElementById('player-container');
            container.style.display = 'block';
            
            // Request Fullscreen on the whole container
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        // 2. Delay the Play command to let the phone handle the transition
            setTimeout(() => {
                if (player && player.playVideo) {
                    player.playVideo();
                }
            }, 300);
        
            // 3. FORCE LIFT FALLBACK
            // If the phone is slow and the API doesn't report 'PLAYING', 
            // we manually hide the curtain after 5 seconds so they aren't stuck.
            setTimeout(() => {
                if (curtain.style.display !== 'none') {
                    console.log("Force lifting curtain due to slow connection...");
                    curtain.style.display = 'none';
                    document.getElementById('shield').style.display = 'block';
                }
            }, 5000);
        });

      let secretCode = "";
window.addEventListener("keydown", (e) => {
    secretCode += e.key.toLowerCase();
    if (secretCode.includes("carrot")) {
        alert("🥕 BUNNY MODE ACTIVATED! 🥕\nClover says: You're a genius!");
        document.body.style.backgroundColor = "#ff9900"; // Turns the screen orange!
        secretCode = ""; // Reset
    }
});
    </script>
</body>
</html>
